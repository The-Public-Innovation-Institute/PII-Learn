<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PII Learn — The Public Innovation Institute</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#c8401e;--ink:#0e0e0c;--paper:#faf9f5;--warm:#f3f0e8;--rule:rgba(14,14,12,0.12);
  --serif:'Playfair Display',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;
}
html,body{height:100%;font-family:var(--sans);background:var(--ink);color:var(--ink);overflow:hidden}

/* ── Background canvas ── */
#bg-canvas{position:fixed;inset:0;z-index:0;opacity:0.12}

/* ── Page ── */
.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}

/* ── Logo bar ── */
.logo-bar{position:fixed;top:0;left:0;right:0;padding:20px 32px;display:flex;align-items:center;gap:12px;opacity:0;animation:fadeDown .8s ease .3s forwards}
.logo-ring{width:36px;height:36px;border:1.5px solid var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-ring span{font-family:var(--serif);font-size:11px;font-weight:700;color:var(--accent)}
.logo-name{font-family:var(--serif);font-size:14px;font-weight:700;color:#fff}
.logo-sub{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-top:1px}

/* ── Hero ── */
.hero{text-align:center;margin-bottom:48px}
.eyebrow{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);opacity:0;animation:fadeUp .9s ease .5s forwards;margin-bottom:16px}
.welcome-line{display:block;font-family:var(--serif);font-weight:400;color:#fff;line-height:1.1;opacity:0}
.welcome-line.l1{font-size:clamp(2.8rem,7vw,5.5rem);animation:floatIn 1.2s cubic-bezier(.22,.61,.36,1) .75s forwards}
.welcome-line.l2{font-size:clamp(2rem,5vw,4rem);font-style:italic;color:rgba(200,64,30,.85);animation:floatIn 1.2s cubic-bezier(.22,.61,.36,1) 1s forwards;margin-top:6px}
.welcome-sub{font-size:14px;color:rgba(255,255,255,.4);margin-top:20px;opacity:0;animation:fadeUp .8s ease 1.4s forwards;letter-spacing:.02em}

/* ── Card ── */
.card{width:100%;max-width:420px;background:var(--paper);border-radius:2px;padding:44px 48px;opacity:0;animation:fadeUp .9s ease 1.2s forwards}
.card-label{font-family:var(--serif);font-size:18px;font-weight:700;margin-bottom:6px;color:var(--ink)}
.card-sub{font-size:12px;color:rgba(14,14,12,.4);margin-bottom:28px}
.field{margin-bottom:18px}
.field label{display:block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-bottom:6px;color:rgba(14,14,12,.5)}
.field input{width:100%;padding:11px 13px;border:1.5px solid var(--rule);border-radius:2px;font-family:var(--sans);font-size:14px;background:var(--warm);outline:none;transition:border-color .2s;color:var(--ink)}
.field input:focus{border-color:var(--accent)}
.field input::placeholder{color:rgba(14,14,12,.3)}
.btn-login{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:2px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s;display:flex;align-items:center;justify-content:center;min-height:46px;margin-top:8px}
.btn-login:hover{opacity:.88}
.btn-login:disabled{opacity:.55;cursor:not-allowed}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
.error-msg{font-size:12px;color:#9b2020;text-align:center;margin-top:12px;min-height:18px;display:none}

/* ── Footer ── */
footer{position:fixed;bottom:0;left:0;right:0;text-align:center;padding:14px;font-size:11px;letter-spacing:.06em;color:rgba(255,255,255,.2);opacity:0;animation:fadeUp .8s ease 1.8s forwards}

@keyframes floatIn{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;animation-delay:.01ms!important}}
@media(max-width:480px){.card{padding:32px 28px}.welcome-line.l1{font-size:2.4rem}.welcome-line.l2{font-size:1.8rem}}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<header class="logo-bar">
  <div class="logo-ring"><span>PII</span></div>
  <div>
    <div class="logo-name">PII Learn</div>
    <div class="logo-sub">The Public Innovation Institute</div>
  </div>
</header>

<main class="page">
  <section class="hero">
    <p class="eyebrow">Learning Management Platform</p>
    <span class="welcome-line l1">Welcome to</span>
    <span class="welcome-line l2">PII Learn</span>
    <p class="welcome-sub">Sign in to access your courses, materials, and assignments.</p>
  </section>

  <div class="card">
    <h1 class="card-label">Sign In</h1>
    <p class="card-sub">Enter your credentials below to continue.</p>
    <div class="field">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="you@example.org" autocomplete="email"/>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn-login" id="loginBtn">Sign In</button>
    <p class="error-msg" id="errorMsg"></p>
  </div>
</main>

<footer>© 2026 The Public Innovation Institute · All rights reserved</footer>

<!-- Background particle network -->
<script>
(function(){
  var c=document.getElementById('bg-canvas'),ctx=c.getContext('2d'),W,H,nodes=[];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;nodes=[];
    var n=Math.floor(W*H/16000);
    for(var i=0;i<n;i++)nodes.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*1.5+.5});
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    for(var i=0;i<nodes.length;i++)for(var j=i+1;j<nodes.length;j++){
      var dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<130){ctx.beginPath();ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(nodes[j].x,nodes[j].y);ctx.strokeStyle='rgba(200,64,30,'+((1-d/130)*.4)+')';ctx.lineWidth=.5;ctx.stroke();}
    }
    nodes.forEach(function(n){
      ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fillStyle='rgba(200,64,30,.5)';ctx.fill();
      n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>W)n.vx*=-1;if(n.y<0||n.y>H)n.vy*=-1;
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);resize();draw();
})();
</script>

const loginBtn = document.getElementById('loginBtn');
const errorMsg = document.getElementById('errorMsg');

function showError(msg){ errorMsg.textContent=msg; errorMsg.style.display='block'; }
function hideError(){ errorMsg.style.display='none'; }
function setLoading(on){ loginBtn.disabled=on; loginBtn.innerHTML=on?'<div class="spinner"></div>':'Sign In'; }

async function handleLogin(){
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  hideError();
  if(!email||!password){ showError('Please enter your email and password.'); return; }
  setLoading(true);
  try{
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if(error) throw error;
    window.location.href='dashboard.html';
  } catch(err){
    showError(err.message||'Sign in failed. Please try again.');
    setLoading(false);
  }
}

loginBtn.addEventListener('click', handleLogin);
document.addEventListener('keydown', e=>{ if(e.key==='Enter') handleLogin(); });

// Auto-redirect if already signed in
const { data } = await sb.auth.getSession();
if(data.session) window.location.href='dashboard.html';
</script>
