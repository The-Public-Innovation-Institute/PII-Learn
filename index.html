<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PII Learn — The Public Innovation Institute</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:       #0A1628;
      --navy-mid:   #112240;
      --navy-light: #1A3358;
      --gold:       #C9A84C;
      --gold-light: #E2C97A;
      --gold-dim:   #9E7C30;
      --white:      #FFFFFF;
      --off-white:  #F5F5F0;
      --grey:       #8A9BB0;
      --error:      #D64045;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--navy);
      color: var(--white);
      overflow: hidden;
    }

    /* ── Background canvas ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.18;
    }

    /* ── Main layout ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* ── Logo bar ── */
    .logo-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 1.25rem 2.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      opacity: 0;
      animation: fadeDown 0.8s ease 0.4s forwards;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      border: 2px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }

    .logo-text {
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--grey);
    }

    /* ── Hero welcome ── */
    .hero {
      text-align: center;
      margin-bottom: 3.5rem;
    }

    .eyebrow {
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0;
      animation: fadeUp 0.9s ease 0.6s forwards;
      margin-bottom: 1.2rem;
    }

    .welcome-line {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      color: var(--white);
      line-height: 1.12;
      opacity: 0;
    }

    .welcome-line.l1 {
      font-size: clamp(2.4rem, 6vw, 5rem);
      letter-spacing: -0.01em;
      animation: floatIn 1.2s cubic-bezier(0.22, 0.61, 0.36, 1) 0.85s forwards;
    }

    .welcome-line.l2 {
      font-size: clamp(1.6rem, 4vw, 3.2rem);
      font-style: italic;
      color: var(--gold-light);
      letter-spacing: 0.04em;
      animation: floatIn 1.2s cubic-bezier(0.22, 0.61, 0.36, 1) 1.1s forwards;
      margin-top: 0.3rem;
    }

    .welcome-sub {
      font-size: 0.88rem;
      color: var(--grey);
      letter-spacing: 0.04em;
      margin-top: 1.4rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 1.5s forwards;
    }

    /* ── Login card ── */
    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(17, 34, 64, 0.7);
      border: 1px solid rgba(201, 168, 76, 0.2);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 4px;
      padding: 2.5rem 2.8rem;
      opacity: 0;
      animation: fadeUp 0.9s ease 1.4s forwards;
    }

    .card-label {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 1.8rem;
      font-weight: 500;
    }

    .field {
      margin-bottom: 1.2rem;
    }

    .field label {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--grey);
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    .field input {
      width: 100%;
      background: rgba(10, 22, 40, 0.6);
      border: 1px solid rgba(138, 155, 176, 0.25);
      border-radius: 3px;
      padding: 0.75rem 1rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: var(--white);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input::placeholder { color: rgba(138, 155, 176, 0.5); }

    .field input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.12);
    }

    .btn-login {
      width: 100%;
      margin-top: 1.8rem;
      padding: 0.85rem;
      background: var(--gold);
      color: var(--navy);
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      position: relative;
    }

    .btn-login:hover { background: var(--gold-light); }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.55; cursor: not-allowed; }

    .btn-login .spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid var(--navy);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    .btn-login.loading .label { display: none; }
    .btn-login.loading .spinner { display: block; }

    .error-msg {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: var(--error);
      text-align: center;
      min-height: 1.2em;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .error-msg.visible { opacity: 1; }

    /* ── Footer ── */
    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      text-align: center;
      padding: 1rem;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      color: rgba(138, 155, 176, 0.4);
      opacity: 0;
      animation: fadeUp 0.8s ease 2s forwards;
    }

    /* ── Keyframes ── */
    @keyframes floatIn {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; animation-delay: 0.01ms !important; }
    }

    @media (max-width: 480px) {
      .card { padding: 2rem 1.6rem; }
      .welcome-line.l1 { font-size: 2.2rem; }
      .welcome-line.l2 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<header class="logo-bar">
  <div class="logo-mark">PII</div>
  <span class="logo-text">The Public Innovation Institute</span>
</header>

<main class="page">
  <section class="hero">
    <p class="eyebrow">Learning Management Platform</p>
    <span class="welcome-line l1">Welcome to</span>
    <span class="welcome-line l2">PII Learn</span>
    <p class="welcome-sub">Sign in to access your courses, materials, and assignments.</p>
  </section>

  <div class="card">
    <p class="card-label">Sign In</p>

    <div class="field">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="you@example.org" autocomplete="email" />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••••" autocomplete="current-password" />
    </div>

    <button class="btn-login" id="loginBtn" onclick="handleLogin()">
      <span class="label">Sign In</span>
      <div class="spinner"></div>
    </button>

    <p class="error-msg" id="errorMsg"></p>
  </div>
</main>

<footer>© 2026 The Public Innovation Institute · All rights reserved</footer>

<!-- Geometric background canvas script -->
<script>
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, nodes = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    initNodes();
  }

  function initNodes() {
    nodes = [];
    const count = Math.floor((W * H) / 18000);
    for (let i = 0; i < count; i++) {
      nodes.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        r: Math.random() * 1.5 + 0.5
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    // Draw connections
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const dx = nodes[i].x - nodes[j].x;
        const dy = nodes[i].y - nodes[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 140) {
          ctx.beginPath();
          ctx.moveTo(nodes[i].x, nodes[i].y);
          ctx.lineTo(nodes[j].x, nodes[j].y);
          ctx.strokeStyle = `rgba(201, 168, 76, ${(1 - dist / 140) * 0.35})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
    // Draw nodes
    nodes.forEach(n => {
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(201, 168, 76, 0.6)';
      ctx.fill();
      n.x += n.vx; n.y += n.vy;
      if (n.x < 0 || n.x > W) n.vx *= -1;
      if (n.y < 0 || n.y > H) n.vy *= -1;
    });
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize();
  draw();
})();
</script>

<!-- Supabase + Auth -->
<script>
  const SUPABASE_URL = 'https://adtgtzblbneqedkysurk.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_BqM_1nYZxEy7uZosrGZHfQ_sB4Y-YKU';
  const { createClient } = supabase;
  const sb = createClient(adtgtzblbneqedkysurk.supabase.co, sb_publishable_BqM_1nYZxEy7uZosrGZHfQ_sB4Y-YKU);

  // Role routing map
  const ROLE_ROUTES = {
    admin:      'dashboard.html?role=admin',
    instructor: 'dashboard.html?role=instructor',
    student:    'dashboard.html?role=student'
  };

  async function handleLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('loginBtn');
    const errEl    = document.getElementById('errorMsg');

    errEl.textContent = '';
    errEl.classList.remove('visible');

    if (!email || !password) {
      showError('Please enter your email and password.');
      return;
    }

    btn.disabled = true;
    btn.classList.add('loading');

    try {
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;

      // Fetch user role from profiles table
      const { data: profile, error: profileErr } = await sb
        .from('profiles')
        .select('role')
        .eq('id', data.user.id)
        .single();

      if (profileErr || !profile) throw new Error('Could not retrieve user profile.');

      const role = profile.role || 'student';
      window.location.href = ROLE_ROUTES[role] || ROLE_ROUTES.student;

    } catch (err) {
      showError(err.message || 'Sign in failed. Please try again.');
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('visible');
  }

  // Allow Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });

  // Check if already logged in
  (async () => {
    const { data } = await sb.auth.getSession();
    if (data.session) {
      const { data: profile } = await sb
        .from('profiles')
        .select('role')
        .eq('id', data.session.user.id)
        .single();
      const role = profile?.role || 'student';
      window.location.href = ROLE_ROUTES[role] || ROLE_ROUTES.student;
    }
  })();
</script>

</body>
</html>
